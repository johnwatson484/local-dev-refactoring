# Canonical sonar-project.properties for Defra Node services.
#
# Replace <org> with the GitHub organisation name (e.g. DEFRA) and
# <repo-name> with the actual GitHub repo name (e.g. fcp-mpdp-frontend).
# <org-lowercase> is the SonarCloud organisation slug — typically the lowercase
# version of the GitHub org name (e.g. defra for DEFRA).
# The projectKey MUST match the key in .vscode/settings.json sonarlint.connectedMode.project.
#
# sonar.sources, sonar.tests, sonar.exclusions, and sonar.cpd.exclusions should not
# need changing for standard src/ + test/ layouts.

sonar.projectKey=<org>_<repo-name>
sonar.organization=<org-lowercase>

sonar.links.homepage=https://github.com/<org>/<repo-name>
sonar.links.ci=https://github.com/<org>/<repo-name>/actions
sonar.links.scm=https://github.com/<org>/<repo-name>
sonar.links.issue=https://github.com/<org>/<repo-name>/issues

sonar.sources=src/
sonar.exclusions=test/**/*.test.js
sonar.tests=test/

sonar.javascript.lcov.reportPaths=./coverage/lcov.info

sonar.cpd.exclusions=test/
