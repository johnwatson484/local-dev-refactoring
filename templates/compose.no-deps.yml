# Canonical compose.yml — NO backing services (e.g. a frontend that only calls a
# backend API over HTTP). Single file; the app is gated behind `profiles: ["app"]`.
#
# Usage:
#   docker compose up -d                 # starts NOTHING here (no deps, app is profiled)
#   docker compose --profile app up -d   # starts the app (used by the orchestration repo)
#
# Substitutions when copying: replace `my-frontend` and `my-backend` with real names,
# and the ports 3000/9000 with your service's ports.
#
# Two-layer env pattern:
#   - env_file: .env       -> pulls developer-supplied values (e.g. localhost hosts, keys)
#   - environment:         -> overrides ONLY the docker-internal hostnames so inter-container
#                             traffic routes correctly. `environment` wins over `env_file`.
services:
  my-frontend:
    profiles:
      - app
    build:
      context: .
      target: development
    ports:
      - '3000:3000'
      - '9000:9229'
    volumes:
      - ./src:/home/node/src
      - ./package.json:/home/node/package.json
      - ./vite.config.js:/home/node/vite.config.js
    env_file:
      - .env
    environment:
      MY_BACKEND_ENDPOINT: http://my-backend:3001
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
    name: my-network
